name: dependency-scan
on:
  pull_request:
  push:
    branches: [main]
jobs:
  vulnerable-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Scan for vulnerable NuGet packages
        run: |
          if [ -f ControlTower.sln ]; then
            dotnet restore ControlTower.sln
            dotnet list ControlTower.sln package --vulnerable --include-transitive 2>&1 | tee vuln.txt
            if grep -q "has the following vulnerable" vuln.txt; then
              echo "::error::Vulnerable NuGet packages detected"
              exit 1
            fi
            echo "No vulnerable packages."
          else
            echo "No solution yet (bootstrap adds no runtime deps) — gate reserved."
          fi
      - name: Scan npm production deps (web) if present
        run: |
          if [ -f web/package.json ]; then
            # Audit the shipped (production) dependency graph only. Dev/build tooling (vite/vitest)
            # is not in the SPA artifact and is excluded to keep the gate about what actually ships.
            cd web && npm audit --omit=dev --audit-level=high
          else
            echo "No web/package.json yet — npm scan reserved."
          fi
